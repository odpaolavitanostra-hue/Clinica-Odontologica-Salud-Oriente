name: Despliegue Automático a Supabase

on:
  push:
    branches:
      - main  # Esto hace que se active cada vez que guardas cambios

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Instalar Supabase CLI
        run: npm install -g supabase

      - name: Vincular y Desplegar
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} -p ${{ secrets.SUPABASE_DB_PASSWORD }}
          supabase db push -p ${{ secrets.SUPABASE_DB_PASSWORD }}
